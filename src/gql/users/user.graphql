query GetUser($user: UserID!) {
  getUser(userId: $user) {
    id
    avatar
    created_at
    username
    mods {
      mod {
        id
        mod_reference
        name
        logo
        views
        downloads
        short_description
        latestVersions {
          alpha {
            id
            version
          }
          beta {
            id
            version
          }
          release {
            id
            version
          }
        }
        compatibility {
          EA {
            state
            note
          }
          EXP {
            state
            note
          }
        }
        tags {
          id
          name
          description
        }
      }
    }
    modpacks {
      modpack {
        id
        created_at
        creator_id
        updated_at
        name
        full_description
        short_description
        logo
        hidden
        installs
        views
        tags {
          id
          name
          description
        }
        parent_id
        mods {
          version_constraint
          mod_id
        }
        compatibility {
          EA {
            state
            note
          }
          EXP {
            state
            note
          }
        }
      }
    }
    guides {
      id
      name
      short_description
      views
    }
  }

  
}
