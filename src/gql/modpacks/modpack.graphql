query GetModpack($modpackID: ModpackID!) {
  getModpack(modpackID: $modpackID) {
    id
    created_at
    creator_id
    updated_at
    name
    full_description
    short_description
    logo
    hidden
    installs
    views
    tags {
      id
      name
      description
    }
    parent_id
    mods {
      version_constraint
      mod_id
    }
    compatibility {
      EA {
        state
        note
      }
      EXP {
        state
        note
      }
    }
  }
}

query GetModCompatibilities($modpackID: ModpackID!) {
  getModCompatibilities(modpackID: $modpackID) {
    worstEA {
      id
      name
      compatibility {
        EA {
          state
        }
        EXP {
          state
        }
      }
    }
    worstEXP {
      id
      name
      compatibility {
        EA {
          state
        }
        EXP {
          state
        }
      }
    }
    compatibility {
      EA {
        state
      }
      EXP {
        state
      }
    }
  }
}
